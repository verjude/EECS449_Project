[project]
name = "my-todo-app"
version = "1.0.0"
description = "Jac client application: my-todo-app"
entry-point = "main.jac"

[dependencies]
ddgs = "~=9.13"
byllm = "~=0.6"

[dependencies.npm]
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.71.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"

[plugins.client]

[plugins.byllm.model]
verbose = true

[plugins.scale.secrets]
GEMINI_API_KEY="${GEMINI_API_KEY}"
SERPER_API_KEY="${SERPER_API_KEY}"